<div id="app"></div>

<script>
    // ==================== НАСТРОЙКИ SUPABASE ====================
    const SUPABASE_URL = 'https://pucttpqqrjjnpxzwbwei.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_58NvUqUTTkDqCQ2hQUzyuw_IL1kWCw8';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    // ============================================================

    // ==================== Глобальные переменные ====================
    let currentUser = null;
    let mediaList = [];
    let currentLightboxIndex = 0;
    let chatSubscription = null;

    // ==================== Вспомогательные функции ====================
    function showToast(msg, duration = 2000) {
        let t = document.querySelector('.toast-notify');
        if (t) t.remove();
        const toast = document.createElement('div');
        toast.className = 'toast-notify';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    function formatDuration(sec) {
        if (isNaN(sec)) return '0:00';
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function getVideoDuration(url, callback) {
        const video = document.createElement('video');
        video.preload = 'metadata';
        video.onloadedmetadata = () => { callback(video.duration); video.remove(); };
        video.onerror = () => { callback(null); video.remove(); };
        video.src = url;
    }

    // ==================== API вызовы ====================
    async function apiFetch(endpoint, options = {}) {
        const token = localStorage.getItem('token');
        const headers = {
            'Content-Type': 'application/json',
            ...options.headers
        };
        if (token) {
            headers['Authorization'] = `Bearer ${token}`;
        }
        const res = await fetch(endpoint, { ...options, headers });
        const data = await res.json();
        if (!res.ok) {
            throw new Error(data.error || 'Ошибка запроса');
        }
        return data;
    }

    async function registerUser(username, password) {
        const data = await apiFetch('/api/auth/register', {
            method: 'POST',
            body: JSON.stringify({ username, password })
        });
        if (data.success) {
            localStorage.setItem('token', data.token);
            currentUser = data.user;
            showToast('Регистрация успешна!');
            renderMainApp();
        } else {
            throw new Error(data.error);
        }
    }

    async function loginUser(username, password) {
        const data = await apiFetch('/api/auth/login', {
            method: 'POST',
            body: JSON.stringify({ username, password })
        });
        if (data.success) {
            localStorage.setItem('token', data.token);
            currentUser = data.user;
            showToast('Добро пожаловать!');
            renderMainApp();
        } else {
            throw new Error(data.error);
        }
    }

    async function checkAuth() {
        const token = localStorage.getItem('token');
        if (!token) return false;
        try {
            const data = await apiFetch('/api/auth/me');
            currentUser = data;
            return true;
        } catch (err) {
            localStorage.removeItem('token');
            return false;
        }
    }

    async function logout() {
        localStorage.removeItem('token');
        currentUser = null;
        if (chatSubscription) chatSubscription.unsubscribe();
        renderAuthForm();
    }

    async function fetchGallery() {
        const data = await apiFetch('/api/media');
        mediaList = data;
        renderGallery();
        const counter = document.getElementById('mediaCounter');
        if (counter) counter.innerText = `📦 Медиа: ${mediaList.length}`;
    }

    async function uploadFiles(files) {
        const formData = new FormData();
        let added = 0;
        for (let f of files) {
            if (f.type.startsWith('image/') || f.type.startsWith('video/')) {
                formData.append('files', f);
                added++;
            }
        }
        if (added === 0) { showToast('Нет подходящих файлов'); return; }
        const token = localStorage.getItem('token');
        const res = await fetch('/api/upload', {
            method: 'POST',
            body: formData,
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (data.success) {
            showToast(`✅ Загружено ${data.uploaded.length} файлов`);
            await fetchGallery();
        } else {
            showToast('Ошибка загрузки');
        }
    }

    async function toggleLike(mediaId, likeSpan, countSpan) {
        const token = localStorage.getItem('token');
        if (!token) { showToast('Войдите, чтобы ставить лайки'); return; }
        const res = await fetch('/api/likes', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ mediaId })
        });
        const data = await res.json();
        if (res.ok) {
            const icon = likeSpan.querySelector('i');
            if (data.liked) {
                icon.className = 'fas fa-heart';
            } else {
                icon.className = 'far fa-heart';
            }
            countSpan.innerText = data.count;
        }
    }

    async function getLikeStatus(mediaId) {
        const token = localStorage.getItem('token');
        const res = await fetch(`/api/likes?mediaId=${mediaId}`, {
            headers: token ? { 'Authorization': `Bearer ${token}` } : {}
        });
        const data = await res.json();
        return data;
    }

    async function addComment(mediaId, text) {
        const token = localStorage.getItem('token');
        if (!token) { showToast('Войдите, чтобы комментировать'); return false; }
        const res = await fetch('/api/comments', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ mediaId, text })
        });
        const data = await res.json();
        if (res.ok) {
            return data;
        } else {
            showToast('Ошибка добавления комментария');
            return false;
        }
    }

    async function getComments(mediaId) {
        const res = await fetch(`/api/comments?mediaId=${mediaId}`);
        const data = await res.json();
        return data;
    }

    async function uploadAvatar(file) {
        const formData = new FormData();
        formData.append('avatar', file);
        const token = localStorage.getItem('token');
        const res = await fetch('/api/avatar', {
            method: 'POST',
            body: formData,
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (res.ok) {
            currentUser.avatar_url = data.avatar_url;
            updateAvatarDisplay();
            showToast('Аватар обновлён');
        } else {
            showToast('Ошибка загрузки аватара');
        }
    }

    // ==================== Рендер галереи ====================
    function renderGallery() {
        const galleryEl = document.getElementById('gallery');
        if (!galleryEl) return;
        galleryEl.innerHTML = '';
        if (mediaList.length === 0) {
            galleryEl.innerHTML = '<div class="empty-message">🎈 Галерея пуста. Добавьте фото или видео!</div>';
            return;
        }
        mediaList.forEach((item, idx) => {
            const post = createPostElement(item, idx);
            galleryEl.appendChild(post);
            if (item.type.startsWith('video/')) {
                const durationSpan = post.querySelector('.video-duration');
                getVideoDuration(item.url, (dur) => {
                    if (durationSpan) durationSpan.innerText = formatDuration(dur);
                });
            }
        });
    }

    async function createPostElement(item, idx) {
        const div = document.createElement('div');
        div.className = 'post';
        div.dataset.id = item.id;

        const mediaDiv = document.createElement('div');
        mediaDiv.className = 'post-media';
        if (item.type.startsWith('image/')) {
            const img = document.createElement('img');
            img.src = item.url;
            img.alt = item.original_name;
            mediaDiv.appendChild(img);
        } else {
            const video = document.createElement('video');
            video.src = item.url;
            video.preload = 'metadata';
            mediaDiv.appendChild(video);
            const durSpan = document.createElement('div');
            durSpan.className = 'video-duration';
            durSpan.innerText = '0:00';
            mediaDiv.appendChild(durSpan);
        }

        const delBtn = document.createElement('button');
        delBtn.innerHTML = '❌';
        delBtn.className = 'delete-post-btn';
        delBtn.onclick = async (e) => {
            e.stopPropagation();
            const pin = prompt('Введите пин-код администратора (6666):');
            if (pin !== '6666') { if (pin) showToast('Неверный пин-код'); return; }
            const token = localStorage.getItem('token');
            const res = await fetch(`/api/media/${item.id}`, {
                method: 'DELETE',
                headers: { 'X-Pin': pin, 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                showToast('Удалено');
                await fetchGallery();
            } else {
                showToast('Ошибка удаления');
            }
        };
        mediaDiv.appendChild(delBtn);
        mediaDiv.onclick = () => openLightbox(idx);
        div.appendChild(mediaDiv);

        const likeStatus = await getLikeStatus(item.id);
        const comments = await getComments(item.id);
        const statsDiv = document.createElement('div');
        statsDiv.className = 'post-stats';
        const countsDiv = document.createElement('div');
        countsDiv.className = 'like-comment-count';

        const likeSpan = document.createElement('span');
        const liked = likeStatus.liked || false;
        likeSpan.innerHTML = `<i class="${liked ? 'fas' : 'far'} fa-heart"></i> <span class="like-count">${likeStatus.count || 0}</span>`;
        const countSpan = likeSpan.querySelector('.like-count');
        likeSpan.onclick = async (e) => {
            e.stopPropagation();
            await toggleLike(item.id, likeSpan, countSpan);
        };
        const commentSpan = document.createElement('span');
        commentSpan.innerHTML = `<i class="far fa-comment"></i> ${comments.length}`;
        commentSpan.onclick = (e) => { e.stopPropagation(); openLightbox(idx); };
        countsDiv.appendChild(likeSpan);
        countsDiv.appendChild(commentSpan);
        statsDiv.appendChild(countsDiv);
        div.appendChild(statsDiv);
        return div;
    }

    // ==================== Лайтбокс ====================
    const lightbox = document.createElement('div');
    lightbox.className = 'lightbox';
    lightbox.id = 'lightbox';
    document.body.appendChild(lightbox);

    async function openLightbox(index) {
        if (!mediaList.length) return;
        currentLightboxIndex = (index + mediaList.length) % mediaList.length;
        await renderLightbox();
        lightbox.classList.add('active');
    }

    function closeLightbox() {
        lightbox.classList.remove('active');
        const video = lightbox.querySelector('video');
        if (video) video.pause();
    }

    async function renderLightbox() {
        const item = mediaList[currentLightboxIndex];
        if (!item) return;
        const likeStatus = await getLikeStatus(item.id);
        const comments = await getComments(item.id);
        lightbox.innerHTML = `
            <div class="lightbox-container">
                <span class="lightbox-close">&times;</span>
                <button class="lightbox-prev">❮</button>
                <button class="lightbox-next">❯</button>
                <div class="lightbox-media-area" id="lightbox-media-area">
                    ${item.type.startsWith('image/') ? 
                        `<img class="lightbox-media" src="${item.url}" alt="">` : 
                        `<video class="lightbox-media" src="${item.url}" controls autoplay></video>`
                    }
                </div>
                <div class="lightbox-comments-area">
                    <div class="lightbox-header">
                        <h4><i class="far fa-comment"></i> Комментарии (${comments.length})</h4>
                        <button class="lightbox-like-btn ${likeStatus.liked ? 'liked' : ''}" id="lightbox-like-btn">
                            <i class="${likeStatus.liked ? 'fas' : 'far'} fa-heart"></i> <span id="lightbox-like-count">${likeStatus.count || 0}</span>
                        </button>
                    </div>
                    <div class="lightbox-comments-list" id="lightbox-comments-list"></div>
                    <div class="lightbox-comment-input-area">
                        <input type="text" class="lightbox-comment-input" id="lightbox-comment-input" placeholder="Написать комментарий...">
                        <button class="btn btn-small" id="lightbox-send-comment">💬 Отправить</button>
                    </div>
                </div>
                <div class="lightbox-counter">${currentLightboxIndex+1} / ${mediaList.length}</div>
            </div>
        `;
        const commentsList = document.getElementById('lightbox-comments-list');
        commentsList.innerHTML = comments.map(c => `
            <div class="lightbox-comment-item">
                <strong>${escapeHtml(c.user)}</strong>
                <small>${new Date(c.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</small><br>
                ${escapeHtml(c.text)}
            </div>
        `).join('');
        if (!comments.length) commentsList.innerHTML = '<div style="color:#886b5e; text-align:center; padding:20px;">💬 Нет комментариев. Будьте первым!</div>';

        const closeBtn = lightbox.querySelector('.lightbox-close');
        const prevBtn = lightbox.querySelector('.lightbox-prev');
        const nextBtn = lightbox.querySelector('.lightbox-next');
        const likeBtn = lightbox.querySelector('#lightbox-like-btn');
        const sendBtn = lightbox.querySelector('#lightbox-send-comment');
        const commentInput = lightbox.querySelector('#lightbox-comment-input');
        const likeCountSpan = lightbox.querySelector('#lightbox-like-count');

        closeBtn.onclick = closeLightbox;
        prevBtn.onclick = async () => {
            currentLightboxIndex = (currentLightboxIndex - 1 + mediaList.length) % mediaList.length;
            await renderLightbox();
        };
        nextBtn.onclick = async () => {
            currentLightboxIndex = (currentLightboxIndex + 1) % mediaList.length;
            await renderLightbox();
        };
        likeBtn.onclick = async () => {
            const liked = likeBtn.classList.contains('liked');
            const newLiked = !liked;
            const newCount = parseInt(likeCountSpan.innerText) + (newLiked ? 1 : -1);
            await toggleLike(item.id, likeBtn, likeCountSpan);
            if (newLiked) likeBtn.classList.add('liked');
            else likeBtn.classList.remove('liked');
            likeCountSpan.innerText = newCount;
        };
        sendBtn.onclick = async () => {
            const text = commentInput.value.trim();
            if (!text) return;
            const result = await addComment(item.id, text);
            if (result) {
                commentInput.value = '';
                await renderLightbox();
            }
        };
        commentInput.onkeypress = async (e) => {
            if (e.key === 'Enter') {
                const text = commentInput.value.trim();
                if (!text) return;
                const result = await addComment(item.id, text);
                if (result) {
                    commentInput.value = '';
                    await renderLightbox();
                }
            }
        };
        lightbox.onclick = (e) => { if (e.target === lightbox) closeLightbox(); };
        const keyHandler = (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'ArrowLeft') prevBtn.click();
            if (e.key === 'ArrowRight') nextBtn.click();
            if (e.key === 'Escape') closeLightbox();
        };
        document.removeEventListener('keydown', keyHandler);
        document.addEventListener('keydown', keyHandler);
    }

    // ==================== Чат ====================
    function initChat() {
        if (chatSubscription) chatSubscription.unsubscribe();
        chatSubscription = supabaseClient
            .channel('chat')
            .on('postgres_changes', {
                event: 'INSERT',
                schema: 'public',
                table: 'messages'
            }, (payload) => {
                const msg = payload.new;
                addMessageToChat(msg.nickname, msg.text, msg.created_at);
            })
            .subscribe();

        loadChatHistory();
    }

    async function loadChatHistory() {
        const { data, error } = await supabaseClient
            .from('messages')
            .select('*')
            .order('created_at', { ascending: true });
        if (error) return;
        const chatDiv = document.getElementById('chatMessages');
        if (!chatDiv) return;
        chatDiv.innerHTML = '';
        data.forEach(msg => addMessageToChat(msg.nickname, msg.text, msg.created_at));
    }

    async function sendMessage(text) {
        if (!currentUser) { showToast('Войдите, чтобы писать в чат'); return; }
        const { error } = await supabaseClient
            .from('messages')
            .insert({
                user_id: currentUser.id,
                nickname: currentUser.username,
                text: text
            });
        if (error) console.error(error);
    }

    function addMessageToChat(nick, text, timestamp) {
        const chatDiv = document.getElementById('chatMessages');
        if (!chatDiv) return;
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message';
        const timeStr = timestamp ? new Date(timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
        msgDiv.innerHTML = `<strong>${escapeHtml(nick)}</strong> <small>${timeStr}</small><br>${escapeHtml(text)}`;
        chatDiv.appendChild(msgDiv);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    // ==================== UI рендеринг ====================
    function updateAvatarDisplay() {
        const container = document.getElementById('avatarContainer');
        if (!container) return;
        if (currentUser?.avatar_url) {
            container.innerHTML = `<img class="avatar" src="${currentUser.avatar_url}" alt="avatar">`;
        } else {
            container.innerHTML = `<div class="avatar-placeholder">👤</div>`;
        }
    }

    function renderMainApp() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="container">
                <div class="gallery-section">
                    <div class="hero"><h1>🎬 VasukHub 📸</h1><p>Сетка публикаций — загружай, лайкай, комментируй!</p></div>
                    <div class="profile-bar">
                        <div id="avatarContainer"></div>
                        <span><strong>${escapeHtml(currentUser.username)}</strong></span>
                        <button class="btn" id="changeAvatarBtn" style="padding:4px 12px;">📷 Аватар</button>
                        <button class="btn" id="logoutBtn" style="padding:4px 12px;">🚪 Выйти</button>
                    </div>
                    <div class="upload-panel">
                        <div class="button-group">
                            <button class="btn btn-primary" id="uploadBtn">📁 + Добавить файлы</button>
                            <button class="btn btn-danger" id="clearAllBtn">🧹 Очистить всё</button>
                        </div>
                        <div class="drop-zone" id="dropZone">📀 Перетащи файлы сюда</div>
                        <input type="file" id="fileInput" multiple accept="image/*,video/*" style="display: none;">
                    </div>
                    <div class="stats">
                        <div class="counter-badge" id="mediaCounter">📦 Медиа: 0</div>
                        <div class="clear-info">❌ Удаление доступно администратору</div>
                    </div>
                    <div class="gallery" id="gallery"><div class="empty-message">Загрузка...</div></div>
                </div>
                <div class="chat-section">
                    <div class="chat-header">
                        <h3>💬 Чат</h3>
                        <button id="clearChatBtn" class="btn btn-small">🧹 Очистить</button>
                    </div>
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chatInput" placeholder="Сообщение...">
                        <button id="sendBtn">➤</button>
                    </div>
                </div>
            </div>
        `;
        updateAvatarDisplay();
        document.getElementById('uploadBtn').onclick = () => document.getElementById('fileInput').click();
        document.getElementById('fileInput').onchange = (e) => {
            if (e.target.files.length) uploadFiles(e.target.files);
            e.target.value = '';
        };
        document.getElementById('clearAllBtn').onclick = async () => {
            const pin = prompt('Введите пин-код администратора (6666):');
            if (pin !== '6666') { if (pin) showToast('Неверный пин-код'); return; }
            const token = localStorage.getItem('token');
            const res = await fetch('/api/media', {
                method: 'DELETE',
                headers: { 'X-Pin': pin, 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                showToast('Всё очищено');
                await fetchGallery();
            } else {
                showToast('Ошибка');
            }
        };
        document.getElementById('logoutBtn').onclick = logout;
        document.getElementById('changeAvatarBtn').onclick = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                await uploadAvatar(file);
            };
            input.click();
        };
        document.getElementById('clearChatBtn').onclick = async () => {
            const pin = prompt('Введите пин-код администратора (6666):');
            if (pin !== '6666') { if (pin) showToast('Неверный пин-код'); return; }
            const { error } = await supabaseClient.from('messages').delete().neq('id', 0);
            if (!error) {
                showToast('Чат очищен');
                await loadChatHistory();
            } else {
                showToast('Ошибка очистки чата');
            }
        };
        setupDragDrop();
        fetchGallery();
        initChat();
        setInterval(fetchGallery, 30000);
    }

    function setupDragDrop() {
        const dz = document.getElementById('dropZone');
        if (!dz) return;
        ['dragenter','dragover','dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => e.preventDefault()));
        dz.addEventListener('dragenter', () => dz.classList.add('drag-over'));
        dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
        dz.addEventListener('drop', (e) => {
            dz.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files.length) uploadFiles(Array.from(files));
        });
        dz.addEventListener('click', () => document.getElementById('fileInput').click());
    }

    // ==================== Авторизация ====================
    function renderAuthForm() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="auth-container">
                <div class="auth-card">
                    <h2>🎬 VasukHub</h2>
                    <div id="authForm">
                        <input type="text" id="authUsername" placeholder="Имя пользователя">
                        <input type="password" id="authPassword" placeholder="Пароль">
                        <div id="confirmPasswordGroup" style="display:none;">
                            <input type="password" id="confirmPassword" placeholder="Подтвердите пароль">
                        </div>
                        <div class="auth-buttons">
                            <button class="btn btn-primary" id="authLoginBtn">Войти</button>
                            <button class="btn" id="authRegisterBtn">Зарегистрироваться</button>
                        </div>
                        <div id="authError" style="color:red; margin-top:10px;"></div>
                    </div>
                </div>
            </div>
        `;
        let isLoginMode = true;
        const loginBtn = document.getElementById('authLoginBtn');
        const registerBtn = document.getElementById('authRegisterBtn');
        const confirmGroup = document.getElementById('confirmPasswordGroup');
        const authUsername = document.getElementById('authUsername');
        const authPassword = document.getElementById('authPassword');
        const errorDiv = document.getElementById('authError');

        const updateButtons = () => {
            if (isLoginMode) {
                loginBtn.style.background = 'linear-gradient(95deg, #FF8066, #F94C6A)';
                registerBtn.style.background = 'white';
                confirmGroup.style.display = 'none';
            } else {
                loginBtn.style.background = 'white';
                registerBtn.style.background = 'linear-gradient(95deg, #FF8066, #F94C6A)';
                confirmGroup.style.display = 'block';
            }
        };
        registerBtn.onclick = () => {
            if (isLoginMode) {
                isLoginMode = false;
                updateButtons();
            } else {
                const username = authUsername.value.trim();
                const password = authPassword.value;
                const confirm = document.getElementById('confirmPassword').value;
                if (!username || !password) { errorDiv.innerText = 'Заполните поля'; return; }
                if (password !== confirm) { errorDiv.innerText = 'Пароли не совпадают'; return; }
                registerUser(username, password).catch(err => errorDiv.innerText = err.message);
            }
        };
        loginBtn.onclick = () => {
            if (!isLoginMode) {
                isLoginMode = true;
                updateButtons();
            } else {
                const username = authUsername.value.trim();
                const password = authPassword.value;
                if (!username || !password) { errorDiv.innerText = 'Заполните поля'; return; }
                loginUser(username, password).catch(err => errorDiv.innerText = err.message);
            }
        };
        updateButtons();
    }

    // ==================== Страница ввода ключа ====================
    function showKeyPage() {
        const savedKey = sessionStorage.getItem('vasukhub_key');
        if (savedKey === '6666') {
            startApp();
            return;
        }
        const overlay = document.createElement('div');
        overlay.className = 'key-overlay';
        overlay.innerHTML = `
            <div class="key-card">
                <div class="key-icon"><i class="fas fa-shield-alt"></i></div>
                <h2>Доступ ограничен</h2>
                <p>Введите секретный ключ для входа</p>
                <div class="key-input-group">
                    <i class="fas fa-key"></i>
                    <input type="password" class="key-input" id="secretKeyInput" placeholder="****" maxlength="4" autofocus>
                </div>
                <button class="key-submit" id="submitKeyBtn"><i class="fas fa-arrow-right"></i> Войти</button>
                <div class="key-error" id="keyError"></div>
            </div>
        `;
        document.body.appendChild(overlay);
        const input = overlay.querySelector('#secretKeyInput');
        const btn = overlay.querySelector('#submitKeyBtn');
        const errorDiv = overlay.querySelector('#keyError');
        const handle = () => {
            if (input.value.trim() === '6666') {
                sessionStorage.setItem('vasukhub_key', '6666');
                overlay.remove();
                startApp();
            } else {
                errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Неверный ключ доступа!';
                input.value = '';
                input.focus();
                input.style.borderColor = '#e53e3e';
                setTimeout(() => input.style.borderColor = '#e2e8f0', 1000);
            }
        };
        btn.onclick = handle;
        input.onkeypress = (e) => { if (e.key === 'Enter') handle(); };
        input.focus();
    }

    async function startApp() {
        const authorized = await checkAuth();
        if (authorized) {
            renderMainApp();
        } else {
            renderAuthForm();
        }
    }

    showKeyPage();
</script>
